<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обмен</title>
    <link rel="stylesheet" href="../css/trade.css">
</head>
<body>
    <h1 class="main-title">Создать обмен</h1>
    <div class="container">
        <form id="tradeForm" class="trade-form">
            <div class="form-group">
                <label for="name">Имя:</label>
                <input type="text" id="name" readonly>
            </div>
            <div class="form-group">
                <label for="phone">Телефон:</label>
                <input type="text" id="phone" readonly>
            </div>
            <div class="form-group">
                <label for="address">Адрес:</label>
                <input type="text" id="address" readonly>
            </div>
            <div class="form-group">
                <label for="amount">Сумма (USDT):</label>
                <input type="number" id="amount" min="0" step="0.01" placeholder="Введите сумму">
            </div>
            <div class="form-group">
                <label for="amount">Сумма (RUB):</label>
            </div>
            <div class="form-group date-group">
                <label for="date">Дата:</label>
                <div class="date-picker">
                    <img src="../icons/left.png" alt="Previous Day" class="date-arrow" id="prevDate">
                    <input type="text" id="date" readonly>
                    <img src="../icons/right.png" alt="Next Day" class="date-arrow" id="nextDate">
                </div>
            </div>
            <div class="form-group time-group">
                <label>Время:</label>
                <div class="time-slots">
                    <label class="time-slot">
                        <input type="radio" name="time" value="12:00-14:00"> 12:00–14:00
                    </label>
                    <label class="time-slot">
                        <input type="radio" name="time" value="16:00-18:00"> 16:00–18:00
                    </label>
                    <label class="time-slot">
                        <input type="radio" name="time" value="20:00-22:00"> 20:00–22:00
                    </label>
                </div>
            </div>
            <button type="submit" class="submit-btn">Создать обмен</button>
        </form>
    </div>
    <div class="button-group">
        <button class="btn create-btn active" onclick="navigateWithUserId('trade.html')">
            <img src="../icons/trade-white.png" alt="Trade Icon" class="btn-icon">Создать обмен
        </button>
        <button class="btn history-btn" onclick="navigateWithUserId('history.html')">
            <img src="../icons/history-white.png" alt="History Icon" class="btn-icon">История обменов
        </button>
        <button class="btn profile-btn" onclick="navigateWithUserId('profile.html')">
            <img src="../icons/profile-white.png" alt="Profile Icon" class="btn-icon">Профиль
        </button>
    </div>
    <script src="../javascript/trade.js"></script>
</body>
</html>
